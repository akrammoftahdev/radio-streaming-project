version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: egonair_postgres
    environment:
      POSTGRES_USER: egonair
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: egonair_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
