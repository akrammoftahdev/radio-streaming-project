apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: egonair-frontend
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/description: "EGONAIR Remote Studio — Next.js Frontend"
    run.googleapis.com/project: egonair-stream-prod
spec:
  template:
    metadata:
      annotations:
        # Keep 1 instance warm to avoid auth cold-start delay
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Cloud SQL Auth Proxy sidecar — REQUIRED for DATABASE_URL socket to resolve.
        # Without this annotation the /cloudsql/<instance> socket never exists.
        run.googleapis.com/cloudsql-instances: egonair-stream-prod:europe-west1:egonair-pg
    spec:
      # Service account with secretmanager.secretAccessor + cloudsql.client roles
      serviceAccountName: egonair-frontend@egonair-stream-prod.iam.gserviceaccount.com
      containers:
        - image: europe-west1-docker.pkg.dev/egonair-stream-prod/egonair/frontend:latest
          ports:
            - name: http1
              containerPort: 3000
          env:
            # ── Non-secret runtime config ──────────────────────────────
            - name: NODE_ENV
              value: "production"
            # ROOT-PATH deployment: no /stream. Auth.js generates /api/auth/... callbacks.
            # AUTH_URL = plain origin only, no trailing slash or path.
            - name: AUTH_URL
              value: "https://egonair-frontend-kjvmkgy5va-ew.a.run.app"
            - name: AUTH_TRUST_HOST
              value: "true"
            # NEXTAUTH_URL overridden here to avoid updating Secret Manager.
            # Root-path deployment: no /stream suffix.
            - name: NEXTAUTH_URL
              value: "https://egonair-frontend-kjvmkgy5va-ew.a.run.app"
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: AUTH_SECRET
                  key: latest
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: egonair-encryption-key
                  key: latest
            - name: AUDIO_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: egonair-audio-token-secret
                  key: latest
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: DATABASE_URL
                  key: latest
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
